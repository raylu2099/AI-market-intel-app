<!DOCTYPE html>
<html lang="zh-CN" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Market Intel{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        up: '#22c55e',
                        down: '#ef4444',
                        neutral: '#6b7280',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        .analysis-content { white-space: pre-wrap; line-height: 1.7; }
        .ticker-up { color: #22c55e; }
        .ticker-down { color: #ef4444; }
    </style>
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen">
    <nav class="bg-gray-900 border-b border-gray-800 px-6 py-3">
        <div class="max-w-7xl mx-auto flex items-center justify-between">
            <a href="/" class="text-xl font-bold text-white">📊 Market Intel</a>
            <div class="flex gap-6 text-sm">
                <a href="/" class="hover:text-white text-gray-400">Dashboard</a>
                <a href="/stocks" class="hover:text-white text-gray-400">Stocks</a>
                <a href="/history" class="hover:text-white text-gray-400">History</a>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto px-6 py-6">
        {% block content %}{% endblock %}
    </main>
    <footer class="text-center text-gray-600 text-xs py-4 border-t border-gray-800">
        Market Intel v1.0 &mdash; Powered by Claude AI + Perplexity
    </footer>
</body>
</html>
